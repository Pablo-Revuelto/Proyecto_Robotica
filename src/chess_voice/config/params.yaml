chess_audio_capture:
  ros__parameters:
    sample_rate: 16000
    block_ms: 30
    start_rms: 0.02
    end_rms: 0.012
    silence_ms: 700
    max_utterance_s: 12.0
    # "pulse" = the PulseAudio backend, the only input wired to the WSLg/RDP
    # microphone under WSL2 (other ALSA devices open but capture silence).
    # On a native Linux box with a real ALSA mic, "" (default device) also works.
    device: "pulse"

chess_whisper_asr:
  ros__parameters:
    model: "openai/whisper-small"
    language: "spanish"
    device: "cpu"

chess_voice_parser:
  ros__parameters:
    use_llm: true
    llm_model_id: "meta-llama/Meta-Llama-3-8B-Instruct"
    llm_temperature: 0.0
    # Token NOT stored here (keep empty). It is read from the HF cache
    # (`huggingface-cli login` -> ~/.cache/huggingface/token) or the
    # HUGGINGFACEHUB_API_TOKEN env var. Do NOT commit a token into this file.
    huggingface_api_token: ""
    square_size: 0.05
    board_z: 0.02
    board_centre_x: 0.0
    board_centre_y: 0.0
