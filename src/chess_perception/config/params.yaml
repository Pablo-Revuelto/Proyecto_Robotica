chess_board_state_estimator:
  ros__parameters:

    # YOLO model weights — ABSOLUTE path so it resolves regardless of the node's
    # working directory (the old relative path only resolved when CWD=/home/adolfo).
    yolo_weights: "/home/adolfo/Proyecto_Robotica/src/chess_perception/models/best.pt"
    conf_threshold: 0.35

    # Overhead camera intrinsics
    camera_height: 1.2        # metres above board plane
    hfov: 1.2                 # horizontal field of view, radians
    image_width: 1280
    image_height: 720

    # Board geometry (must match chess_brain/board_geometry)
    square_size: 0.05         # metres per square
    board_z: 0.02             # board surface height in world frame
    board_centre_x: 0.0
    board_centre_y: 0.0

    # Publishing
    publish_rate: 5.0         # Hz
